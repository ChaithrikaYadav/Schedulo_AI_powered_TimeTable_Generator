# =============================================================================
# render.yaml — Infrastructure as Code for Render.com (free tier)
#
# Deploys Schedulo as two services:
#   1. schedulo-api   — FastAPI backend (Python)
#   2. schedulo-ui    — Vite frontend (Static Site)
#
# Setup:
#   1. Fork/push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your GitHub repo — Render will read this file automatically
#   4. Add environment variables in the Render dashboard (GROQ_API_KEY etc.)
#
# Free tier limits: 512 MB RAM, spins down after 15 min inactivity
# =============================================================================

services:

  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: schedulo-api
    runtime: python
    plan: free
    region: oregon

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.local.txt
      pip install -e .
      python scripts/seed_from_csvs.py

    startCommand: uvicorn schedulo.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: ENVIRONMENT
        value: server
      - key: DEBUG
        value: "false"
      - key: DB_ENGINE
        value: sqlite
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./schedulo.db
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: ALLOWED_ORIGINS
        # Replace with your actual Render frontend URL after first deploy
        value: https://schedulo-ui.onrender.com
      - key: GROQ_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: HF_API_TOKEN
        sync: false   # Set this manually in Render dashboard

    healthCheckPath: /health

  # ── Frontend: React + Vite ─────────────────────────────────────────────────
  - type: web
    name: schedulo-ui
    runtime: static
    plan: free
    region: oregon

    buildCommand: |
      cd frontend
      npm ci
      npm run build

    staticPublishPath: ./frontend/dist

    envVars:
      - key: VITE_API_URL
        # Replace with your actual Render backend URL after first deploy
        value: https://schedulo-api.onrender.com

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

    routes:
      # Serve index.html for all routes (required for React Router)
      - type: rewrite
        source: /*
        destination: /index.html
